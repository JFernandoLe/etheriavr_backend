services:
  # Tu base de datos (ya la tienes bien)
  etheriavr_db:
    image: mysql:8.0
    container_name: etheriavr_db
    environment: 
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - etherivr_db_data:/var/lib/mysql
    ports: 
      - "3308:3306"
    restart: always

  # Tu API de FastAPI
  etheriavr_api:
    build: . # Le dice: "Busca el Dockerfile en esta misma carpeta"
    container_name: etheriavr_api
    env_file: .env # Lee automáticamente tu archivo .env
    ports:
      - "8000:8000"
    depends_on:
      - etheriavr_db # No arranca la API hasta que la DB esté lista
    restart: always

volumes:
  etherivr_db_data: